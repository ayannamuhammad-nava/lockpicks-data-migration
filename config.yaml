database:
  legacy:
    host: ${DB_LEGACY_HOST:localhost}
    port: 5432
    database: ${DB_LEGACY_NAME:legacy_db}
    user: ${DB_LEGACY_USER:postgres}
    password: ${DB_LEGACY_PASSWORD:postgres}
  modern:
    host: ${DB_MODERN_HOST:localhost}
    port: 5432
    database: ${DB_MODERN_NAME:modern_db}
    user: ${DB_MODERN_USER:postgres}
    password: ${DB_MODERN_PASSWORD:postgres}

validation:
  sample_size: 1000
  tables: [claimants, employers, claims, benefit_payments]
  governance:
    pii_keywords:
      - ssn
      - social_security
      - passport
      - drivers_license
      - credit_card
      - card_number
      - cvv
      - account_number
      - routing_number
      - bank_acct
      - bank_routing
      - dob
      - date_of_birth
      - salary
      - income
      - email
      - phone
      - address
      - zip
      - latitude
      - longitude
      - ip_address
      - mac_address
      # COBOL abbreviated field patterns
      - emal
      - phon
      - bact
      - brtn
      - adr1
      - ein
    naming_regex: "^[a-z0-9_]+$"
    max_null_percent: 10
    required_fields:
      claimants: [cl_recid, cl_fnam, cl_lnam, cl_ssn, cl_emal]
      claims: [cm_recid, cm_clmnt, cm_fildt, cm_wkamt]
      benefit_payments: [bp_recid, bp_clmid, bp_payam]
      employers: [er_recid, er_name]

confidence:
  weights:
    structure: 0.4
    integrity: 0.4
    governance: 0.2
  thresholds:
    green: 90
    yellow: 70

aggregates:
  claimants:
    - name: status_counts
      legacy_query: "SELECT cl_stat as status, COUNT(*) as count FROM claimants GROUP BY cl_stat ORDER BY status"
      modern_query: "SELECT claimant_status as status, COUNT(*) as count FROM claimants GROUP BY claimant_status ORDER BY status"
      comparison: exact
    - name: total_count
      legacy_query: "SELECT COUNT(*) as total FROM claimants"
      modern_query: "SELECT COUNT(*) as total FROM claimants"
      comparison: exact
  claims:
    - name: total_benefits
      legacy_query: "SELECT COALESCE(SUM(total_paid), 0) as total_sum FROM claims"
      modern_query: "SELECT COALESCE(SUM(total_paid), 0) as total_sum FROM claims"
      comparison: tolerance
      tolerance: 0.01
  benefit_payments:
    - name: total_disbursed
      legacy_query: "SELECT COALESCE(SUM(bp_payam), 0) as total FROM benefit_payments"
      modern_query: "SELECT COALESCE(SUM(payment_amount), 0) as total FROM benefit_payments"
      comparison: tolerance
      tolerance: 0.01
  employers:
    - name: total_count
      legacy_query: "SELECT COUNT(*) as total FROM employers"
      modern_query: "SELECT COUNT(*) as total FROM employers"
      comparison: exact

referential_integrity:
  claims:
    - child_table: claims
      parent_table: claimants
      fk_column: claimant_id
      pk_column: claimant_id
    - child_table: claims
      parent_table: employers
      fk_column: employer_id
      pk_column: employer_id
  benefit_payments:
    - child_table: benefit_payments
      parent_table: claims
      fk_column: claim_id
      pk_column: claim_id

rag:
  explain_threshold: 0.5
  mapping_threshold: 0.3

artifacts:
  base_path: ./artifacts

logging:
  level: INFO
  format: json
