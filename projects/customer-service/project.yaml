# DM Project Configuration
# Generated by: dm init customer-service

project:
  name: "Customer Service"
  description: "Contact Management System — COBOL to PostgreSQL migration"
  version: "1.0"

connections:
  legacy:
    type: postgres
    host: ${DB_LEGACY_HOST:localhost}
    port: 5432
    database: ${DB_LEGACY_NAME:legacy_db}
    user: ${DB_LEGACY_USER:app}
    password: ${DB_LEGACY_PASSWORD:secret123}
  modern:
    type: postgres
    host: ${DB_MODERN_HOST:localhost}
    port: 5432
    database: ${DB_MODERN_NAME:modern_db}
    user: ${DB_MODERN_USER:app}
    password: ${DB_MODERN_PASSWORD:secret123}

datasets:
  - name: contacts
    legacy_table: contacts
    modern_table: contacts

validation:
  sample_size: 1000
  governance:
    pii_keywords: [ssn, email, phone, dob, credit_card, account_number, drivers_license, bank]
    naming_regex: "^[a-z0-9_]+$"
    max_null_percent: 10
    required_fields:
      contacts: []

  aggregates:
    contacts: []

  referential_integrity: {}

scoring:
  weights:
    structure: 0.4
    integrity: 0.4
    governance: 0.2
  thresholds:
    green: 90
    yellow: 70

metadata:
  path: ./metadata
  rag:
    explain_threshold: 0.5
    mapping_threshold: 0.3

plugins: []
# Uncomment to load your domain plugin:
# plugins:
#   - plugins.my_plugin.MyPlugin

artifacts:
  base_path: ./artifacts

