# DM Project Configuration
# Generated by: dm init my-migration

project:
  name: "my-migration"
  description: "Data migration validation project"
  version: "1.0"

connections:
  legacy:
    type: postgres
    host: ${DB_LEGACY_HOST:localhost}
    port: 5432
    database: ${DB_LEGACY_NAME:legacy_db}
    user: ${DB_LEGACY_USER:postgres}
    password: ${DB_LEGACY_PASSWORD:postgres}
  modern:
    type: postgres
    host: ${DB_MODERN_HOST:localhost}
    port: 5432
    database: ${DB_MODERN_NAME:modern_db}
    user: ${DB_MODERN_USER:postgres}
    password: ${DB_MODERN_PASSWORD:postgres}

datasets:
  - name: my_table
    legacy_table: my_table
    modern_table: my_table

validation:
  sample_size: 1000
  governance:
    pii_keywords: [ssn, email, phone, dob, credit_card, account_number]
    naming_regex: "^[a-z0-9_]+$"
    max_null_percent: 10
    required_fields:
      my_table: []

  aggregates:
    my_table: []

  referential_integrity: {}

scoring:
  weights:
    structure: 0.4
    integrity: 0.4
    governance: 0.2
  thresholds:
    green: 90
    yellow: 70

metadata:
  path: ./metadata
  rag:
    explain_threshold: 0.5
    mapping_threshold: 0.3

plugins: []
# Uncomment to load your domain plugin:
# plugins:
#   - plugins.my_plugin.MyPlugin

artifacts:
  base_path: ./artifacts

# OpenMetadata integration
openmetadata:
  host: ${OM_HOST:http://localhost:8585}
  auth_token: ${OM_AUTH_TOKEN:}
  legacy_service: "my_legacy_service"
  legacy_database: "my_database"
  legacy_schema: "public"

# Schema generation settings
schema_generation:
  target: postgres
  naming_convention: snake_case
  abbreviation_expansion: true
  type_optimization: true
  pii_handling:
    default_action: hash
  normalization:
    enabled: true
    min_group_size: 3
    prefix_detection: true
    lookup_threshold: 20
  constraints:
    infer_not_null: true
    infer_unique: true
    infer_check: true
  defaults:
    add_created_at: true
    add_updated_at: true
    id_strategy: serial
