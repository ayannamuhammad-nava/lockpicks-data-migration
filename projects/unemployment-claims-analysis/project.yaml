# Schema generation settings
schema_generation:
  target: postgres
  naming_convention: snake_case
  abbreviation_expansion: true
  type_optimization: true
  pii_handling:
    default_action: hash
  normalization:
    enabled: true
    min_group_size: 3
    prefix_detection: true
    lookup_threshold: 20
  constraints:
    infer_not_null: true
    infer_unique: true
    infer_check: true
  defaults:
    add_created_at: true
    add_updated_at: true
    id_strategy: serial
