# DM Project Configuration
# Generated by: dm init unemployment-claims-analysis

project:
  name: "unemployment-claims-analysis"
  description: "Data migration validation project"
  version: "1.0"

connections:
  legacy:
    type: postgres
    host: ${DB_LEGACY_HOST:localhost}
    port: 5432
    database: ${DB_LEGACY_NAME:legacy_db}
    user: ${DB_LEGACY_USER:app}
    password: ${DB_LEGACY_PASSWORD:secret123}
  modern:
    type: postgres
    host: ${DB_MODERN_HOST:localhost}
    port: 5432
    database: ${DB_MODERN_NAME:modern_db}
    user: ${DB_MODERN_USER:app}
    password: ${DB_MODERN_PASSWORD:secret123}

datasets:
  - name: claimants
    legacy_table: claimants
    modern_table: claimants
  - name: employers
    legacy_table: employers
    modern_table: employers
  - name: claims
    legacy_table: claims
    modern_table: claims
  - name: benefit_payments
    legacy_table: benefit_payments
    modern_table: benefit_payments

validation:
  sample_size: 1000
  governance:
    pii_keywords: [ssn, email, phone, dob, credit_card, account_number]
    naming_regex: "^[a-z0-9_]+$"
    max_null_percent: 10
    required_fields:
      claimants: []
      employers: []
      claims: []
      benefit_payments: []

  aggregates:
    claimants: []
    employers: []
    claims: []
    benefit_payments: []

  referential_integrity: {}

scoring:
  weights:
    structure: 0.4
    integrity: 0.4
    governance: 0.2
  thresholds:
    green: 90
    yellow: 70

metadata:
  path: ./metadata
  rag:
    explain_threshold: 0.5
    mapping_threshold: 0.3

plugins: []
# Uncomment to load your domain plugin:
# plugins:
#   - plugins.my_plugin.MyPlugin

artifacts:
  base_path: ./artifacts

